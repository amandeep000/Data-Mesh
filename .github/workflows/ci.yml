name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ─── TypeScript / NestJS / Next.js ──────────────────────────
  typescript:
    name: TS — Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (all projects)
        run: npx tsc --noEmit -p tsconfig.base.json

      - name: Lint (affected)
        run: npx nx affected --target=lint --base=origin/main --head=HEAD

      - name: Test (affected) with coverage
        run: npx nx affected --target=test --base=origin/main --head=HEAD --configuration=ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datamesh_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          flags: typescript

  # ─── Python Ingestion ───────────────────────────────────────
  python:
    name: Python — Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingestion
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy type-check
        run: mypy src/ --strict

      - name: Pytest with coverage
        run: pytest --cov=src --cov-report=xml --cov-fail-under=80
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datamesh_test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/ingestion/coverage.xml
          flags: python

  # ─── Prisma Schema Check ────────────────────────────────────
  prisma:
    name: Prisma — Schema Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datamesh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datamesh_test

      - name: Run migrations (dry-run)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datamesh_test
